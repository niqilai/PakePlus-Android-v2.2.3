<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开庭日历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* 🔥 核心：移除移动端所有点击浅蓝色高亮方块 */
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }

        body {
            background: linear-gradient(to bottom right, #f8fafc, #eff6ff);
            min-height: 100vh;
            padding: 1rem;
        }

        .calendar-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #dbeafe;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2.5rem;
            right: -2.5rem;
            width: 10rem;
            height: 10rem;
            background: linear-gradient(to bottom right, rgba(219, 234, 254, 0.4), rgba(224, 231, 255, 0.4));
            border-radius: 50%;
            filter: blur(3rem);
            z-index: 0;
        }

        .card-content {
            position: relative;
            z-index: 10;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .nav-btn {
            padding: 0.5rem;
            background: linear-gradient(to bottom right, #eff6ff, #eef2ff);
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-btn:hover {
            background: linear-gradient(to bottom right, #dbeafe, #e0e7ff);
            transform: scale(1.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .nav-btn span {
            color: #2563eb;
            font-size: 1.25rem;
            font-weight: bold;
        }

        .calendar-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #1f2937;
        }

        .today-btn {
            display: block;
            margin: 0 auto 1rem;
            padding: 0.375rem 1.25rem;
            background: linear-gradient(to right, #2563eb, #4f46e5);
            color: white;
            border: none;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .today-btn:hover {
            background: linear-gradient(to right, #1d4ed8, #4338ca);
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.375rem;
            margin-bottom: 0.5rem;
        }

        .week-day {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #2563eb;
            padding: 0.25rem;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.375rem;
        }

        .day-btn {
            position: relative;
            padding: 0.375rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.125rem;
            color: #374151;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .day-btn:hover {
            background: linear-gradient(to bottom right, #eff6ff, #eef2ff);
        }

        .day-btn:active {
            transform: scale(0.95);
        }

        .day-btn.disabled {
            color: #d1d5db;
            cursor: not-allowed;
        }

        .day-num {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .day-lunar {
            font-size: 9px;
            color: #6b7280;
            font-weight: 500;
        }

        .day-festival {
            font-size: 9px;
            color: #2563eb;
            font-weight: 500;
        }

        /* 图标样式 */
        .material-icons {
            font-family: "Material Icons";
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }

        /* 弹窗样式 */
        .modal-mask { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:99999; }
        .modal-content { background:white; width:85%; max-width:320px; border-radius:16px; }
        .modal-body { padding:26px 20px; text-align:center; color:#2563eb; }
        .modal-footer { display:flex; border-top:1px solid #dbeafe; }
        .modal-btn { flex:1; padding:16px; border:none; background:none; font-weight:bold; cursor:pointer; }
        .modal-btn-cancel { color:#6b7280; border-right:1px solid #dbeafe; }
        .modal-btn-confirm { color:#2563eb; }
        
        .preview-modal-mask {
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7);
            display:none; justify-content:center; align-items:center; z-index:999999;
            padding: 12px;
        }
        .preview-modal-mask.fullscreen {
            background: rgba(0,0,0,0.92);
        }
        .preview-modal-content {
            width: 92%; max-width:600px; background:white; border-radius:16px;
            max-height: calc(100vh - 80px); overflow:auto;
        }
        .preview-modal-close {
            position: fixed; top:20px; right:20px; width:44px; height:44px; border-radius:50%;
            background:white; color:#2563eb; border:none; font-size:22px; cursor:pointer;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.1); z-index:9999999;
        }
        .preview-modal-body { padding:10px; display:flex; flex-direction:column; align-items:center; }
        .preview-img { max-width:100%; max-height:calc(100vh - 180px); object-fit:contain; border-radius:16px; cursor:pointer; }
        .pdf-container canvas { max-width:100%; max-height:calc(100vh - 180px); width:100% !important; height:auto !important; border-radius:16px; cursor:pointer; }
        .pdf-pagination { display:flex; gap:16px; margin-top:16px; align-items:center; }
        .pdf-page-btn { padding:8px 14px; background:#2563eb; color:white; border:none; border-radius:16px; }
        .pdf-loading { display:flex; flex-direction:column; align-items:center; padding:40px; color:#6b7280; }
        .loading-spinner { width:40px; height:40px; border:3px solid #dbeafe; border-top:3px solid #2563eb; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        
        /* 文件管理 */
        .file-manager {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
        }
        .file-btn {
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(to bottom right, #eff6ff, #eef2ff);
            color: #2563eb; border: none; box-shadow: 6px 6px 12px rgba(0,0,0,0.1);
            font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .file-menu {
            position: absolute; bottom: 68px; right: 0;
            background: white; border-radius: 16px; box-shadow: 6px 6px 12px rgba(0,0,0,0.1);
            width: 160px; z-index: 1000; display: none;
        }
        .file-menu-item {
            padding: 14px 16px; font-size: 14px; color: #1f2937; cursor: pointer;
        }
        .file-menu-item:active {
            background: #eff6ff;
        }

        /* 开庭传票管理模块样式 */
        .upload-ocr-container { display: flex; gap: 12px; margin-bottom: 15px; }
        .upload-btn, .ocr-btn {
            flex: 1; padding: 16px 8px; color: white; border: none; border-radius: 16px; cursor: pointer;
            text-align: center;
        }
        .upload-btn { background: #2563eb; }
        .ocr-btn { background: #4f46e5; }
        #file { opacity: 0; position: absolute; z-index: -1; }
        .file-list {
            max-height: 40vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
        }
        .file-item-content {
            padding: 18px; background: #f8fafc; border-radius: 16px; box-shadow: 3px 3px 6px rgba(0,0,0,0.1);
        }
        .remark {
            width: 100%; padding: 14px; border: none; border-radius: 16px; min-height: 130px;
            background: #f8fafc; box-shadow: inset 3px 3px 6px rgba(0,0,0,0.1);
            margin: 10px 0; resize: none;
        }
        .actions { display: flex; gap: 12px; }
        .actions button {
            flex: 1; padding: 14px; border: none; border-radius: 16px; color: white; cursor: pointer;
        }
        .preview-btn { background: #2563eb; }
        .delete-btn { background: #dc2626; }
        .empty { text-align: center; padding: 50px 0; color: #6b7280; }
        
        .day-btn.has-file::after {
            content: ''; width: 5px; height: 5px; background: #2563eb; border-radius: 50%;
            position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
        }
        .day-btn.active {
            background: linear-gradient(to bottom right, #eff6ff, #eef2ff);
            color: #2563eb;
            font-weight: 600;
        }
        .day-btn.today {
            background: linear-gradient(to bottom right, #eff6ff, #eef2ff);
            color: #2563eb;
            font-weight: 600;
        }
    </style>
    <!-- 引入Material Icons字体 -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- 引入外部库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body>
    <!-- 功能弹窗元素 -->
    <div class="modal-mask" id="modal">
        <div class="modal-content">
            <div class="modal-body" id="modal-text"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>
    <div class="preview-modal-mask" id="previewModal">
        <button class="preview-modal-close" id="previewModalClose">×</button>
        <div class="preview-modal-content">
            <div class="preview-modal-body" id="previewModalBody"></div>
        </div>
    </div>
    <input type="file" id="file" accept="application/pdf,image/jpeg,image/jpg,image/gif,image/webp" multiple>
    <input type="file" id="importFile" accept=".json" style="display:none;">

    <!-- 文件管理按钮 -->
    <div class="file-manager">
        <button class="file-btn" id="fileBtn">📁</button>
        <div class="file-menu" id="fileMenu">
            <div class="file-menu-item" id="exportSetting">📤 导出备份</div>
            <div class="file-menu-item" id="importSetting">📥 导入恢复</div>
        </div>
    </div>

    <!-- 界面结构 -->
    <div class="calendar-container">
        <!-- 日历卡片 -->
        <div class="card">
            <div class="card-content">
                <div class="calendar-header">
                    <button class="nav-btn" id="prevBtn">
                        <span class="material-icons">chevron_left</span>
                    </button>
                    <h2 class="calendar-title" id="calendarTitle">2026年 四月</h2>
                    <button class="nav-btn" id="nextBtn">
                        <span class="material-icons">chevron_right</span>
                    </button>
                </div>

                <button class="today-btn" id="todayBtn">今日</button>

                <div class="week-grid">
                    <div class="week-day">日</div>
                    <div class="week-day">一</div>
                    <div class="week-day">二</div>
                    <div class="week-day">三</div>
                    <div class="week-day">四</div>
                    <div class="week-day">五</div>
                    <div class="week-day">六</div>
                </div>

                <div class="day-grid" id="dayGrid"></div>
            </div>
        </div>

        <!-- 开庭传票管理模块 -->
        <div class="card" id="fileUploadBox">
            <h3 style="font-size:16px; color:#2563eb; font-weight:600; margin-bottom:10px;">开庭传票管理</h3>
            <div class="date-title" id="sel-date" style="font-size:14px; color:#1f2937; margin-bottom:15px;">请选择开庭日期</div>
            <div class="upload-ocr-container">
                <label class="upload-btn" for="file">上传传票</label>
                <button class="ocr-btn" id="ocrBtn" disabled>📷 OCR识别全部文字</button>
            </div>
            <div class="file-list" id="file-list"><div class="empty">暂无传票文件</div></div>
        </div>
    </div>

    <script>
        // ==============================================
        // 核心变量初始化
        // ==============================================
        const db = new Dexie("CourtCalendarDB");
        db.version(1).stores({ files: "date, data" });

        let fileData = {};
        let curDate = new Date(), selDate = "";
        let pdfDoc = null, currentPdfPage = 1, totalPdfPages = 0;
        let isRendering = false, isOcring = false;
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,0)}-${String(today.getDate()).padStart(2,0)}`;

        const modal = document.getElementById('modal');
        const modalText = document.getElementById('modal-text');
        const modalFooter = document.getElementById('modal-footer');
        const ocrBtn = document.getElementById('ocrBtn');
        const fileBtn = document.getElementById('fileBtn');
        const fileMenu = document.getElementById('fileMenu');
        const previewModal = document.getElementById('previewModal');
        const previewModalBody = document.getElementById('previewModalBody');
        const previewModalClose = document.getElementById('previewModalClose');

        // 节假日
        const holidays = {
            '2026-01-01':'元旦','2026-02-17':'春节','2026-02-18':'春节','2026-02-19':'春节','2026-02-20':'春节','2026-02-21':'春节','2026-02-22':'春节','2026-02-23':'春节',
            '2026-04-05':'清明','2026-05-01':'劳动','2026-06-20':'端午','2026-10-01':'国庆','2026-10-02':'国庆','2026-10-03':'国庆','2026-10-04':'国庆','2026-10-05':'国庆','2026-10-06':'中秋/国庆','2026-10-07':'国庆'
        };

        // 防抖
        function debounce(func, wait=500) {
            let t; return (...args)=>{clearTimeout(t); t=setTimeout(()=>func(...args), wait);}
        }

        // ==============================================
        // 农历日期计算
        // ==============================================
        function getLunarDate(date) {
            const solarYear = date.getFullYear();
            if(solarYear < 1900 || solarYear > 2100) return "未知";
            const solarMonth = date.getMonth() + 1;
            const solarDay = date.getDate();
            
            const lunarInfo = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b5a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0];
            const lunarMonthNames = ["正","二","三","四","五","六","七","八","九","十","冬","腊"];
            const lunarDayNames = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];

            let i, leap = 0, temp = 0;
            let offset = (Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) - Date.UTC(1900, 0, 31)) / 86400000;

            for (i = 1900; i < 2100 && offset > 0; i++) { temp = lYearDays(i); offset -= temp; }
            if (offset < 0) { offset += temp; i--; }
            let lunarYear = i; leap = leapMonth(i); let isLeap = false;

            for (i = 1; i < 13 && offset > 0; i++) {
                if (leap > 0 && i == (leap + 1) && isLeap == false) { --i; isLeap = true; temp = leapDays(lunarYear); } 
                else { temp = monthDays(lunarYear, i); }
                if (isLeap == true && i == (leap + 1)) isLeap = false; offset -= temp;
            }
            if (offset < 0) { offset += temp; --i; }
            return `${lunarMonthNames[i-1]}月${lunarDayNames[offset]}`;

            function lYearDays(y) { let i, sum = 348; for (i=0x8000; i>0x8; i>>=1) sum += (lunarInfo[y-1900]&i)?1:0; return sum+leapDays(y); }
            function leapMonth(y) { return lunarInfo[y-1900] & 0xf; }
            function leapDays(y) { return leapMonth(y)?((lunarInfo[y-1900]&0x10000)?30:29):0; }
            function monthDays(y,m) { return (lunarInfo[y-1900] & (0x10000>>m)) ? 30 : 29; }
        }

        // ==============================================
        // 存储读写
        // ==============================================
        async function loadAll() {
            const all = await db.files.toArray();
            fileData = {}; all.forEach(row => { fileData[row.date] = row.data; });
            renderCal(); renderFile();
        }
        async function saveToDB(date, data) { await db.files.put({ date, data }); }
        async function deleteFromDB(date) { await db.files.delete(date); }

        // ==============================================
        // PDF渲染
        // ==============================================
        async function renderPdfPage(pageNum) {
            if (!pdfDoc || isRendering) return;
            isRendering = true;
            previewModalBody.innerHTML = '<div class="pdf-loading"><div class="loading-spinner"></div><div>加载中...</div></div>';
            const dpr = window.devicePixelRatio || 1;
            const isFull = previewModal.classList.contains('fullscreen');
            const cw = isFull ? window.innerWidth : window.innerWidth*0.9;
            const ch = isFull ? window.innerHeight : window.innerHeight-200;
            try {
                const page = await pdfDoc.getPage(pageNum);
                const vp = page.getViewport({scale:1});
                const scale = Math.min(cw/vp.width, ch/vp.height) * dpr;
                const svp = page.getViewport({scale});
                const canvas = document.createElement('canvas');
                canvas.width = Math.floor(svp.width); canvas.height = Math.floor(svp.height);
                await page.render({canvasContext:canvas.getContext('2d'), viewport:svp}).promise;
                previewModalBody.innerHTML = `<div class='pdf-container'></div>`;
                previewModalBody.firstChild.appendChild(canvas);
                const bar = document.createElement('div'); bar.className='pdf-pagination';
                const prev = document.createElement('button'); prev.className='pdf-page-btn'; prev.innerText='上一页'; prev.disabled=pageNum==1; prev.onclick=()=>renderPdfPage(pageNum-1);
                const next = document.createElement('button'); next.className='pdf-page-btn'; next.innerText='下一页'; next.disabled=pageNum==totalPdfPages; next.onclick=()=>renderPdfPage(pageNum+1);
                const info = document.createElement('div'); info.innerText=`${pageNum}/${totalPdfPages}`;
                bar.append(prev,info,next); previewModalBody.appendChild(bar);
                canvas.onclick=()=>previewModal.classList.toggle('fullscreen');
            } catch(e) { previewModalBody.innerHTML='<div class="pdf-loading">加载失败</div>'; }
            isRendering=false;
        }
        async function openPdfPreview(base64) {
            try {
                const blob = await (await fetch(base64)).blob();
                const buf = await blob.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(new Uint8Array(buf)).promise;
                totalPdfPages = pdfDoc.numPages;
                previewModal.style.display='flex';
                renderPdfPage(1);
            } catch(e) { showAlert('PDF预览失败：加密或损坏'); }
        }

        // ==============================================
        // 工具函数
        // ==============================================
        function base64ToBlob(base64) {
            const [head, data] = base64.split(';base64,');
            const type = head.split(':')[1];
            const raw = atob(data);
            const u8 = new Uint8Array(raw.length);
            for (let i=0; i<raw.length; i++) u8[i] = raw.charCodeAt(i);
            return new Blob([u8], { type });
        }

        // ==============================================
        // OCR识别
        // ==============================================
        ocrBtn.addEventListener('click', debounce(ocrAutoFill));
        async function ocrAutoFill() {
            if(isOcring) return;
            if (!selDate || !fileData[selDate]?.length) { showAlert('请先选择日期并上传文件！'); return; }
            isOcring = true;
            ocrBtn.disabled = true; ocrBtn.innerText = '⏳ 识别中...';
            let successCount = 0; const total = fileData[selDate].length;
            try {
                for (let i=0; i<total; i++) {
                    try {
                        const item = fileData[selDate][i];
                        let text = '';
                        if (item.type.startsWith('image')) {
                            const blob = base64ToBlob(item.base64);
                            const url = URL.createObjectURL(blob);
                            text = (await Tesseract.recognize(url, 'chi_sim')).data.text.trim() || '未识别到文字';
                            URL.revokeObjectURL(url);
                        } else { text = await pdfToText(item.base64); }
                        fileData[selDate][i].remark = `📝 OCR识别结果：\n${text}`;
                        successCount++;
                    }catch(e){ console.error('单文件OCR失败',e); }
                }
                await saveToDB(selDate, fileData[selDate]);
                renderFile();
                showAlert(`✅ 识别完成！成功 ${successCount}/${total}`);
            } catch (e) { console.error(e); showAlert('❌ 识别失败'); }
            finally { isOcring = false; ocrBtn.disabled = false; ocrBtn.innerText = '📷 OCR识别全部文字'; }
        }
        async function pdfToText(base64) {
            try {
                const blob = base64ToBlob(base64);
                const buf = await blob.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(new Uint8Array(buf)).promise;
                let text = '';
                for (let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    text += (await page.getTextContent()).items.map(j=>j.str).join('') + '\n';
                }
                return text.trim() || 'PDF未识别到文字';
            } catch (e) { return 'PDF识别失败'; }
        }

        // ==============================================
        // 文件操作
        // ==============================================
        function previewFile(idx) {
            const item = fileData[selDate][idx];
            previewModalBody.innerHTML='';
            if (item.type.startsWith('image')) {
                const img = document.createElement('img'); img.className='preview-img'; img.src=item.base64;
                img.onload=()=>{previewModalBody.appendChild(img); img.onclick=()=>previewModal.classList.toggle('fullscreen');};
                previewModal.style.display='flex';
            } else { openPdfPreview(item.base64); }
        }
        const deleteFile = debounce(async (idx)=>{
            fileData[selDate].splice(idx,1);
            if (fileData[selDate].length===0) { delete fileData[selDate]; await deleteFromDB(selDate); } 
            else { await saveToDB(selDate, fileData[selDate]); }
            renderCal(); renderFile();
            showAlert('删除成功');
        });
        document.getElementById('file').addEventListener('change', async (e)=>{
            if (!selDate) return;
            const files = Array.from(e.target.files);
            if (!fileData[selDate]) fileData[selDate] = [];
            for (const f of files) {
                if (f.size>80*1024*1024) { showAlert(f.name+' 超过80MB'); continue; }
                if (fileData[selDate].some(x=>x.name===f.name)) continue;
                const base64 = await new Promise(r=>{const fr=new FileReader(); fr.onload=e=>r(e.target.result); fr.readAsDataURL(f);});
                fileData[selDate].push({name:f.name,type:f.type,base64,remark:''});
            }
            await saveToDB(selDate, fileData[selDate]);
            renderCal(); renderFile();
            e.target.value='';
        });

        // ==============================================
        // 日历渲染（修复显示BUG）
        // ==============================================
        function renderCal() {
            const y = curDate.getFullYear(), m=curDate.getMonth();
            document.getElementById('calendarTitle').innerText=`${y}年 ${m+1}月`;
            const first = new Date(y,m,1).getDay();
            const days = new Date(y,m+1,0).getDate();
            let html='', day=1;
            const rows = Math.ceil((first+days)/7);
            
            for (let i=0; i<rows; i++) {
                for (let j=0; j<7; j++) {
                    if (i==0&&j<first) { html+='<button class="day-btn disabled"></button>'; continue; }
                    if (day>days) { html+='<button class="day-btn disabled"></button>'; continue; }
                    
                    const ds = `${y}-${String(m+1).padStart(2,0)}-${String(day).padStart(2,0)}`;
                    const hasFile = fileData[ds]?.length>0;
                    const isToday = ds===todayStr;
                    const isActive = ds===selDate;
                    const holiday = holidays[ds]||'';
                    const lunar = getLunarDate(new Date(y,m,day));
                    
                    let dayClass = 'day-btn';
                    if (isToday) dayClass += ' today';
                    if (isActive) dayClass += ' active';
                    if (hasFile) dayClass += ' has-file';

                    html+=`<button class="${dayClass}" data-date="${ds}">
                        <span class="day-num">${day}</span>
                        ${holiday ? `<span class="day-festival">${holiday}</span>` : `<span class="day-lunar">${lunar}</span>`}
                    </button>`;
                    day++;
                }
            }
            document.getElementById('dayGrid').innerHTML=html;
            
            // 日期点击
            document.querySelectorAll('.day-btn[data-date]').forEach(btn=>{
                btn.onclick=()=>{
                    closePreviewModal();
                    selDate=btn.dataset.date;
                    document.getElementById('sel-date').innerText=`选中：${selDate}`;
                    document.querySelectorAll('.day-btn.active').forEach(x=>x.classList.remove('active'));
                    btn.classList.add('active');
                    renderFile();
                };
            });
        }

        // ==============================================
        // 文件列表渲染
        // ==============================================
        function renderFile() {
            const list = document.getElementById('file-list');
            if (!selDate || !fileData[selDate] || fileData[selDate].length===0) {
                list.innerHTML='<div class="empty">暂无传票文件</div>';
                ocrBtn.disabled=true;
                return;
            }
            ocrBtn.disabled=false;
            let html='';
            fileData[selDate].forEach((it,idx)=>{
                html+=`<div class="file-item"><div class="file-item-content">
                    <div class="file-name">${it.name}</div>
                    <textarea class="remark" data-idx="${idx}" placeholder="备注">${it.remark||''}</textarea>
                    <div class="actions">
                        <button class="preview-btn" onclick="previewFile(${idx})">预览</button>
                        <button class="delete-btn" onclick="deleteFile(${idx})">删除</button>
                    </div>
                </div></div>`;
            });
            list.innerHTML=html;
            document.querySelectorAll('.remark').forEach(t=>{
                t.oninput=debounce(async ()=>{
                    fileData[selDate][t.dataset.idx].remark = t.value;
                    await saveToDB(selDate, fileData[selDate]);
                });
            });
        }

        // ==============================================
        // 弹窗函数（彻底修复退出BUG）
        // ==============================================
        function showAlert(text) {
            modalText.innerText=text;
            modalFooter.innerHTML='<button class="modal-btn modal-btn-confirm" onclick="modal.style.display=\'none\'">确定</button>';
            modal.style.display='flex';
        }
        function closePreviewModal() { 
            previewModal.style.display='none'; 
            previewModal.classList.remove('fullscreen');
            if(pdfDoc) { pdfDoc.destroy(); pdfDoc=null; }
            previewModalBody.innerHTML = '';
        }

        // ==============================================
        // 事件绑定
        // ==============================================
        // 日历切换
        document.getElementById('prevBtn').onclick=()=>{ curDate.setMonth(curDate.getMonth()-1); renderCal(); };
        document.getElementById('nextBtn').onclick=()=>{ curDate.setMonth(curDate.getMonth()+1); renderCal(); };
        document.getElementById('todayBtn').onclick=()=>{ curDate=new Date(); renderCal(); };

        // 文件菜单
        fileBtn.onclick=(e)=>{ e.stopPropagation(); fileMenu.style.display=fileMenu.style.display=='block'?'none':'block'; };
        document.onclick=(e)=>{ if(!fileBtn.contains(e.target)) fileMenu.style.display='none'; };

        // 预览关闭（三重保障：叉号+遮罩层+ESC）
        previewModalClose.onclick = closePreviewModal;
        previewModal.addEventListener('click', (e) => { if (e.target === previewModal) closePreviewModal(); });
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closePreviewModal(); });

        // 备份/导入
        document.getElementById('exportSetting').onclick=async ()=>{
            const allData = await db.files.toArray();
            const blob = new Blob([JSON.stringify(allData)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `开庭日历备份_${new Date().toLocaleDateString()}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showAlert('导出成功');
        };
        document.getElementById('importSetting').onclick=()=>{
            document.getElementById('importFile').click();
            document.getElementById('importFile').onchange=async (e)=>{
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload=async (e)=>{
                    try {
                        const data = JSON.parse(e.target.result);
                        if(!Array.isArray(data)) throw new Error('格式错误');
                        await db.files.clear();
                        await db.files.bulkPut(data);
                        await loadAll();
                        showAlert('导入成功');
                    } catch (err) { showAlert('导入失败：文件格式错误'); }
                };
                reader.readAsText(file);
            };
        };

        // ==============================================
        // 初始化
        // ==============================================
        window.onload=async ()=>{ await loadAll(); renderCal(); };
    </script>
</body>
</html>
